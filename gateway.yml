server:
  port: 9000

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000      # 5 seconds
        response-timeout: 10s      # 10 seconds

      routes:

        # ---------------- USER SERVICE ----------------
        - id: user-service
          uri: http://localhost:8080
          predicates:
            - Path=/users, /users/**
          filters:
            - name: CircuitBreaker
              args:
                name: userCircuitBreaker
                fallbackUri: forward:/fallback/users
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, INTERNAL_SERVER_ERROR
                methods: GET, POST

        # ---------------- TASK SERVICE ----------------
        - id: task-service
          uri: http://localhost:8081
          predicates:
            - Path=/tasks, /tasks/**
          filters:
            - name: CircuitBreaker
              args:
                name: taskCircuitBreaker
                fallbackUri: forward:/fallback/tasks
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, INTERNAL_SERVER_ERROR
                methods: GET, POST

        # ---------------- NOTIFICATION SERVICE ----------------
        - id: notification-service
          uri: http://localhost:8082
          predicates:
            - Path=/notifications, /notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationCircuitBreaker
                fallbackUri: forward:/fallback/notifications
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, INTERNAL_SERVER_ERROR
                methods: GET, POST

# RESILIENCE CONFIGURATION
resilience4j:
  circuitbreaker:
    instances:
      userCircuitBreaker:
        slidingWindowSize: 20
        failureRateThreshold: 70
        waitDurationInOpenState: 20s

      taskCircuitBreaker:
        slidingWindowSize: 20
        failureRateThreshold: 70
        waitDurationInOpenState: 20s

      notificationCircuitBreaker:
        slidingWindowSize: 20
        failureRateThreshold: 70
        waitDurationInOpenState: 20s

# MANAGEMENT ENDPOINTS
management:
  endpoints:
    web:
      exposure:
        include: gateway,health
