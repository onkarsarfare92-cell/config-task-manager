server:
  port: 9000

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      httpclient:
        connect-timeout: 2000
        response-timeout: 3s

      routes:

        # ---------------- USER SERVICE ----------------
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users, /users/**
          filters:
            - name: CircuitBreaker
              args:
                name: userCircuitBreaker
                fallbackUri: forward:/fallback/users

            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, INTERNAL_SERVER_ERROR
                methods: GET, POST

        # ---------------- TASK SERVICE ----------------
        - id: task-service
          uri: lb://task-service
          predicates:
            - Path=/tasks, /tasks/**
          filters:
            - name: CircuitBreaker
              args:
                name: taskCircuitBreaker
                fallbackUri: forward:/fallback/tasks

            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, INTERNAL_SERVER_ERROR
                methods: GET, POST

        # ---------------- NOTIFICATION SERVICE ----------------
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications, /notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationCircuitBreaker
                fallbackUri: forward:/fallback/notifications

            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, INTERNAL_SERVER_ERROR
                methods: GET, POST

    #LOAD BALANCER CONFIG
    loadbalancer:
      instances:
        user-service:
          - uri: http://localhost:8080
          - uri: http://localhost:8084

        task-service:
          - uri: http://localhost:8081
          - uri: http://localhost:8083

        notification-service:
          - uri: http://localhost:8082

# RESILIENCE CONFIG
resilience4j:
  circuitbreaker:
    instances:

      userCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

      taskCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

      notificationCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s


services:
  user-service:
    url: http://localhost:8080

  task-service:
    url: http://localhost:8081

  notification-service:
    url: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: gateway,health
