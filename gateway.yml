server:
  port: 9000

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      httpclient:
        connect-timeout: 3000
        response-timeout: 5s

      routes:

        # ================= USER SERVICE =================

        # ✅ READ APIs (GET)
        - id: user-service-get
          uri: http://localhost:8080
          predicates:
            - Path=/users, /users/**
            - Method=GET
          filters:
            - name: CircuitBreaker
              args:
                name: userCircuitBreaker
                fallbackUri: forward:/fallback/users
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY, INTERNAL_SERVER_ERROR
                methods: GET

        # ❌ WRITE APIs (POST, PUT, DELETE)
        - id: user-service-write
          uri: http://localhost:8080
          predicates:
            - Path=/users, /users/**
            - Method=POST,PUT,DELETE


        # ================= TASK SERVICE =================

        # ✅ READ APIs (GET)
        - id: task-service-get
          uri: http://localhost:8081
          predicates:
            - Path=/tasks, /tasks/**
            - Method=GET
          filters:
            - name: CircuitBreaker
              args:
                name: taskCircuitBreaker
                fallbackUri: forward:/fallback/tasks
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY, INTERNAL_SERVER_ERROR
                methods: GET

        # ❌ WRITE APIs (POST, PUT, DELETE)
        - id: task-service-write
          uri: http://localhost:8081
          predicates:
            - Path=/tasks, /tasks/**
            - Method=POST,PUT,DELETE


        # ================= NOTIFICATION SERVICE =================

        # ✅ READ APIs (GET)
        - id: notification-service-get
          uri: http://localhost:8082
          predicates:
            - Path=/notifications, /notifications/**
            - Method=GET
          filters:
            - name: CircuitBreaker
              args:
                name: notificationCircuitBreaker
                fallbackUri: forward:/fallback/notifications
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY, INTERNAL_SERVER_ERROR
                methods: GET

        # ❌ WRITE APIs (POST)
        - id: notification-service-write
          uri: http://localhost:8082
          predicates:
            - Path=/notifications, /notifications/**
            - Method=POST


# ================= RESILIENCE CONFIG =================

resilience4j:
  circuitbreaker:
    instances:
      userCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

      taskCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

      notificationCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s


# ================= MANAGEMENT =================

management:
  endpoints:
    web:
      exposure:
        include: gateway,health


# ================= LOGGING =================

logging:
  level:
    org.springframework.cloud.gateway: INFO
