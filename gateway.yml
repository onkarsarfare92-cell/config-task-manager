server:
  port: 9000

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: user-service
          uri: ${services.user-service.url}
          predicates:
            - Path=/users, /users/**

        - id: task-service
          uri: ${services.task-service.url}
          predicates:
            - Path=/tasks, /tasks/**

        - id: notification-service
          uri: ${services.notification-service.url}
          predicates:
            - Path=/notifications, /notifications/**

services:
  user-service:
    url: http://localhost:8080

  task-service:
    url: http://localhost:8081

  notification-service:
    url: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: gateway,health
